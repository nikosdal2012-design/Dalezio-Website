<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DALEZIO | Admin Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #000000; --off-white: #f4f0e8; --gray: #888;
            --accent: #c8a96e; --cyan: #3ad6d0; --magenta: #ff4d8d;
            --font-disp: 'Bebas Neue', sans-serif;
            --font-ser: 'Cormorant Garamond', serif;
            --font-mono: 'DM Mono', monospace;
        }
        *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: #060606; color: var(--off-white);
            font-family: var(--font-mono); min-height: 100vh;
            padding: 40px; display: flex; flex-direction: column; align-items: center;
        }
        .container {
            width: 100%; max-width: 800px;
        }
        .header {
            display: flex; justify-content: space-between; align-items: center;
            margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        h1 { font-family: var(--font-disp); font-size: 40px; letter-spacing: 2px; }
        .btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
            color: var(--off-white); padding: 12px 24px; border-radius: 6px;
            font-family: var(--font-mono); font-size: 12px; letter-spacing: 1px;
            cursor: pointer; transition: all 0.2s;
        }
        .btn:hover { background: rgba(200,169,110,0.1); border-color: var(--accent); }
        .btn-danger { background: rgba(255,77,141,0.1); border-color: rgba(255,77,141,0.3); color: var(--magenta); }
        .btn-danger:hover { background: rgba(255,77,141,0.2); }
        
        .card {
            background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05);
            padding: 32px; border-radius: 12px; margin-bottom: 32px;
        }
        .card h2 { font-family: var(--font-disp); font-size: 24px; margin-bottom: 20px; letter-spacing: 1px; color: var(--accent); }
        
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 2px; color: var(--gray); margin-bottom: 8px; }
        input, select, textarea {
            width: 100%; background: #111; border: 1px solid rgba(255,255,255,0.1);
            color: #fff; padding: 12px; border-radius: 6px; font-family: var(--font-mono); font-size: 14px;
        }
        input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
        
        .project-list { display: flex; flex-direction: column; gap: 16px; }
        .project-item {
            background: #111; border: 1px solid rgba(255,255,255,0.05); padding: 20px;
            border-radius: 8px; display: flex; justify-content: space-between; align-items: center;
        }
        .project-info h3 { font-size: 18px; margin-bottom: 4px; font-family: var(--font-disp); letter-spacing: 1px; }
        .project-info p { font-size: 12px; color: var(--gray); }
        .project-info span { font-size: 10px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PORTFOLIO ADMIN</h1>
        <button class="btn" onclick="logout()">Logout</button>
    </div>

    <div class="card">
        <h2>ADD NEW VIDEO</h2>
        <form id="addForm">
            <div class="form-group">
                <label>YouTube Link</label>
                <input type="url" id="ytLink" placeholder="https://youtube.com/watch?v=..." required>
            </div>
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" id="pTitle" placeholder="Epic Documentary Edit" required>
            </div>
            <div class="form-group">
                <label>Description (Optional)</label>
                <input type="text" id="pDesc" placeholder="Short description of your role">
            </div>
            <div class="form-group">
                <label>Category</label>
                <select id="pCategory" onchange="toggleCustomCategory()">
                    <option value="DOCUMENTARY">DOCUMENTARY</option>
                    <option value="LONG-FORM">LONG-FORM</option>
                    <option value="LIFESTYLE">LIFESTYLE</option>
                    <option value="GAMING">GAMING</option>
                    <option value="SHORTS">SHORTS</option>
                    <option value="CUSTOM">Custom...</option>
                </select>
                <input type="text" id="pCustomCategory" placeholder="Enter custom category" style="display: none; margin-top: 10px;">
            </div>
            <button type="submit" class="btn">Add Project</button>
        </form>
    </div>

    <div class="card">
        <h2>CURRENT PROJECTS</h2>
        <div class="project-list" id="projectList">
            <!-- Rendered by JS -->
        </div>
    </div>
</div>

<script>
    // Security check
    if (sessionStorage.getItem('adminAuth') !== 'true') {
        window.location.href = 'index.html';
    }

    function logout() {
        sessionStorage.removeItem('adminAuth');
        window.location.href = 'index.html';
    }

    const LOCAL_KEY = 'dalezio_yt_portfolio';
    
    function getProjects() {
        const data = localStorage.getItem(LOCAL_KEY);
        if (data) return JSON.parse(data);
        return [];
    }

    function saveProjects(projects) {
        localStorage.setItem(LOCAL_KEY, JSON.stringify(projects));
        renderProjects();
    }

    function renderProjects() {
        const list = document.getElementById('projectList');
        const projects = getProjects();
        if (projects.length === 0) {
            list.innerHTML = '<p style="color:var(--gray); font-size:12px;">No projects found. Add one above.</p>';
            return;
        }

        list.innerHTML = projects.map(p => `
            <div class="project-item">
                <div class="project-info">
                    <h3>${p.title}</h3>
                    <span>${p.category}</span>
                    <p>${p.ytLink}</p>
                </div>
                <button class="btn btn-danger" onclick="deleteProject('${p.id}')">Delete</button>
            </div>
        `).join('');
    }

    function deleteProject(id) {
        if(confirm('Are you sure you want to delete this project?')) {
            let projects = getProjects();
            projects = projects.filter(p => p.id !== id);
            saveProjects(projects);
        }
    }

    document.getElementById('addForm').addEventListener('submit', (e) => {
        e.preventDefault();
        
        const pass = prompt("Please enter the admin password to confirm:");
        if (pass !== "Dalezio.comeditor2012!") {
            alert("Incorrect password. Project not added.");
            return;
        }

        const title = document.getElementById('pTitle').value;
        const desc = document.getElementById('pDesc').value;
        const ytLink = document.getElementById('ytLink').value;
        let category = document.getElementById('pCategory').value;
        
        if (category === 'CUSTOM') {
            category = document.getElementById('pCustomCategory').value.trim().toUpperCase();
        }

        const newProject = {
            id: Date.now().toString(),
            title: title,
            desc: desc,
            ytLink: ytLink,
            category: category,
            thumb: '' // Will be generated in index.html dynamically via YT ID
        };

        const projects = getProjects();
        // Add to front of list
        projects.unshift(newProject);
        saveProjects(projects);
        e.target.reset();
    });

    function toggleCustomCategory() {
        const select = document.getElementById('pCategory');
        const customInput = document.getElementById('pCustomCategory');
        if (select.value === 'CUSTOM') {
            customInput.style.display = 'block';
            customInput.required = true;
        } else {
            customInput.style.display = 'none';
            customInput.required = false;
        }
    }

    renderProjects();
</script>
</body>
</html>
